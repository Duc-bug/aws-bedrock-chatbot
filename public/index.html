<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Nexus AI</title>
  <meta name="description" content="Chatbot AI thông minh" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* CSS Reset and Variables */
    :root {
      --bg-main: #212121;
      --bg-sidebar: #171717;
      --bg-input: #2f2f2f;
      --bg-hover: #2f2f2f;
      --text-main: #ececec;
      --text-muted: #b4b4b4;
      --border-color: rgba(255, 255, 255, 0.1);
      --btn-primary: #ececec;
      --btn-primary-text: #212121;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* Layout */
    #sidebar {
      width: 260px;
      background: var(--bg-sidebar);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-color);
      transition: transform 0.3s ease;
      z-index: 100;
    }

    #main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      height: 100vh;
      min-width: 0;
    }

    /* Sidebar Components */
    .sidebar-header {
      padding: 12px;
    }

    .btn-new-chat {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-main);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-new-chat:hover {
      background: var(--bg-hover);
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    .session-item {
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 4px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.2s;
    }

    .session-item:hover {
      background: var(--bg-hover);
    }

    .session-item .session-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-item .session-del {
      opacity: 0;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
    }

    .session-item:hover .session-del {
      opacity: 1;
    }

    .session-item .session-del:hover {
      color: #ef4444;
    }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      width: 100%;
      background: transparent;
      border: none;
      border-radius: 8px;
      color: var(--text-main);
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
      text-align: left;
    }

    .sidebar-btn:hover {
      background: var(--bg-hover);
    }

    /* Main Content */
    .header {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid transparent;
      z-index: 10;
    }

    .header-center {
      font-weight: 500;
      color: var(--text-muted);
      font-size: 15px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }

    .mobile-menu-btn {
      display: none;
      background: transparent;
      border: none;
      color: var(--text-main);
      font-size: 24px;
      cursor: pointer;
    }

    /* Chat Container */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      scroll-behavior: smooth;
    }

    .chat-wrapper {
      display: flex;
      flex-direction: column;
      padding-bottom: 40px;
    }

    /* Welcome */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      animation: fadeIn 0.5s ease;
      padding: 20px;
    }

    .welcome-icon {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .welcome-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .welcome-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      max-width: 600px;
    }

    .chip {
      padding: 10px 16px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: transparent;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .chip:hover {
      background: var(--bg-hover);
      color: var(--text-main);
    }

    /* Message Item */
    .message {
      padding: 24px 20px;
      display: flex;
      justify-content: center;
    }

    .message-inner {
      width: 100%;
      max-width: 768px;
      display: flex;
      gap: 20px;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .message.user .avatar {
      background: #4b5563;
    }

    .message.bot .avatar {
      background: transparent;
    }

    .bubble {
      flex: 1;
      font-size: 16px;
      line-height: 1.6;
      color: var(--text-main);
      overflow-x: auto;
    }

    /* Input Area */
    #input-area {
      padding: 0 20px 24px;
      background: linear-gradient(180deg, transparent, var(--bg-main) 20%);
    }

    .input-box-wrapper {
      max-width: 768px;
      margin: 0 auto;
      position: relative;
    }

    .input-box {
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 12px 48px 12px 16px;
      display: flex;
      align-items: flex-end;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      transition: border-color 0.2s;
    }

    .input-box:focus-within {
      border-color: rgba(255, 255, 255, 0.3);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-family: inherit;
      font-size: 16px;
      resize: none;
      max-height: 200px;
      line-height: 1.5;
    }

    #user-input::placeholder {
      color: var(--text-muted);
    }

    #btn-send {
      position: absolute;
      right: 12px;
      bottom: 10px;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--btn-primary);
      color: var(--btn-primary-text);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.2s;
      font-size: 16px;
    }

    #btn-send:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }

    /* Modals */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal {
      background: var(--bg-sidebar);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      padding: 24px;
    }

    .modal h3 {
      margin-bottom: 16px;
      font-weight: 600;
    }

    .modal textarea {
      width: 100%;
      height: 120px;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      color: var(--text-main);
      font-family: inherit;
      resize: vertical;
      margin-bottom: 16px;
      outline: none;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .btn-secondary {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--text-main);
      cursor: pointer;
    }

    .btn-secondary:hover {
      background: var(--bg-hover);
    }

    .btn-primary {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      background: var(--btn-primary);
      color: var(--btn-primary-text);
      cursor: pointer;
      font-weight: 500;
    }

    /* Responsive */
    @media (max-width: 768px) {
      #sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        transform: translateX(-100%);
      }

      #sidebar.open {
        transform: translateX(0);
      }

      .mobile-menu-btn {
        display: block;
      }

      .message {
        padding: 16px;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    /* Markdown specifics */
    pre {
      background: #000;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 12px 0;
      border: 1px solid var(--border-color);
    }

    code {
      font-family: monospace;
    }

    p {
      margin-bottom: 12px;
    }

    p:last-child {
      margin-bottom: 0;
    }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <button class="btn-new-chat" onclick="newChat()">
        <span style="font-size:18px;">+</span> Chat mới
      </button>
    </div>
    <div class="history-list" id="session-list">
      <!-- Session items will appear here -->
    </div>
    <div class="sidebar-footer">
      <button class="sidebar-btn" onclick="openSettings()">
        <span style="font-size: 16px;">⚙️</span> System Prompt
      </button>
      <div style="display:flex; align-items:center; gap: 10px; padding: 12px; font-size: 14px;">
        <div
          style="width: 30px; height: 30px; border-radius: 50%; background: #4b5563; display:flex; align-items:center; justify-content:center;">
          👤</div>
        <div style="flex: 1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" id="user-display-name">
          Người dùng</div>
      </div>
    </div>
  </aside>

  <!-- Sidebar Overlay for mobile -->
  <div id="mobile-overlay" class="modal-overlay" style="z-index: 90;" onclick="toggleSidebar()"></div>

  <!-- Main Content -->
  <main id="main-content">
    <header class="header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
      <div class="header-center">Nexus AI <span style="font-size:12px; color:var(--text-muted);"></span></div>
      <div class="header-right">
        <div id="status-dot"></div>
      </div>
    </header>

    <div id="chat-container">
      <div class="chat-wrapper" id="chat-wrapper">
        <!-- Welcome Screen -->
        <div id="welcome">
          <div class="welcome-icon">
            <img src="/nexus logo.jpg" alt="Logo"
              style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover;"
              onerror="this.style.display='none'; document.getElementById('fallback-icon').style.display='block';">
            <span id="fallback-icon" style="display:none; font-size: 60px;">🤖</span>
          </div>
          <div class="welcome-title">Xin chào! Tôi có thể giúp gì cho bạn?</div>
          <div class="welcome-chips">
            <div class="chip" onclick="sendChip('Giải thích AWS Lambda là gì?')">☁ AWS Lambda</div>
            <div class="chip" onclick="sendChip('Viết một đoạn code Python đơn giản')">🐍 Viết code Python</div>
            <div class="chip" onclick="sendChip('Phân biệt S3 và EBS trong AWS')">💾 S3 vs EBS</div>
            <div class="chip" onclick="sendChip('Kể một câu chuyện vui ngắn')">😄 Câu chuyện hài</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div id="input-area">
      <div class="input-box-wrapper">
        <div class="input-box">
          <textarea id="user-input" placeholder="Nhắn tin cho Nexus AI..." rows="1"></textarea>
          <button id="btn-send" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>
  </main>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-overlay">
    <div class="modal">
      <h3>Cài đặt System Prompt</h3>
      <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 12px;">Định hướng tính cách và hành vi cho AI.
      </p>
      <textarea id="system-prompt" placeholder="VD: Bạn là một trợ lý thông minh..."></textarea>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeSettings()">Hủy</button>
        <button class="btn-primary" onclick="saveSettings()">Lưu</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"
    style="position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:8px; opacity:0; transition:opacity 0.3s; z-index:999; pointer-events:none;">
  </div>

  <script>
    let conversationHistory = [];
    let currentSessionId = null;
    let isLoading = false;
    let cachedSessions = [];

    // UserId setup
    let userId = localStorage.getItem('nexus_userId');
    if (!userId) {
      userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      localStorage.setItem('nexus_userId', userId);
    }

    // Display short ID
    document.getElementById('user-display-name').textContent = userId.substring(0, 12) + '...';

    // ─── DOM Refs ─────────────────────────────────────────────
    const chatContainer = document.getElementById('chat-container');
    const chatWrapper = document.getElementById('chat-wrapper');
    const userInput = document.getElementById('user-input');
    const btnSend = document.getElementById('btn-send');
    const systemPrompt = document.getElementById('system-prompt');
    const statusDot = document.getElementById('status-dot');

    // ─── UI Functions ─────────────────────────────────────────
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      const overlay = document.getElementById('mobile-overlay');
      overlay.style.display = overlay.style.display === 'flex' ? 'none' : 'flex';
    }

    function openSettings() {
      document.getElementById('settings-modal').style.display = 'flex';
    }

    function closeSettings() {
      document.getElementById('settings-modal').style.display = 'none';
    }

    function saveSettings() {
      closeSettings();
      showToast('Đã lưu System Prompt');
      autoSaveSession(); // Save session when system prompt changes
    }

    function showToast(msg, duration = 3000) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.opacity = 1;
      setTimeout(() => toast.style.opacity = 0, duration);
    }

    function newChat() {
      if (conversationHistory.length > 0 && !confirm('Bắt đầu hội thoại mới?')) return;
      conversationHistory = [];
      currentSessionId = null;
      chatWrapper.innerHTML = `
        <div id="welcome">
          <div class="welcome-icon">
            <img src="/nexus logo.jpg" alt="Logo" style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover;" onerror="this.style.display='none'; document.getElementById('fallback-icon').style.display='block';">
            <span id="fallback-icon" style="display:none; font-size: 60px;">🤖</span>
          </div>
          <div class="welcome-title">Xin chào! Tôi có thể giúp gì cho bạn?</div>
          <div class="welcome-chips">
            <div class="chip" onclick="sendChip('Giải thích AWS Lambda là gì?')">☁ AWS Lambda</div>
            <div class="chip" onclick="sendChip('Viết một đoạn code Python đơn giản')">🐍 Viết code Python</div>
            <div class="chip" onclick="sendChip('Phân biệt S3 và EBS trong AWS')">💾 S3 vs EBS</div>
            <div class="chip" onclick="sendChip('Kể một câu chuyện vui ngắn')">😄 Câu chuyện hài</div>
          </div>
        </div>
      `;
      if (window.innerWidth <= 768) toggleSidebar();
    }

    // ─── Input Logic ──────────────────────────────────────────
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
      btnSend.disabled = userInput.value.trim() === '';
    });

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function sendChip(text) {
      userInput.value = text;
      btnSend.disabled = false;
      sendMessage();
    }

    // ─── Message Rendering ────────────────────────────────────
    function renderText(text) {
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
          `<pre><code class="lang-${lang}">${code.trim()}</code></pre>`)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/\n/g, '<br>');
    }

    function appendMessage(role, content) {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      const div = document.createElement('div');
      div.className = `message ${role}`;

      const bubbleContent = role === 'bot' ? renderText(content) : content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');

      const botAvatarHTML = `<img src="/nexus logo.jpg" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" style="width:100%;height:100%;border-radius:4px;object-fit:cover;"><span style="display:none;">🤖</span>`;

      div.innerHTML = `
      <div class="message-inner">
        <div class="avatar">${role === 'bot' ? botAvatarHTML : '👤'}</div>
        <div class="bubble">${bubbleContent}</div>
      </div>
      `;

      chatWrapper.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return div;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message bot';
      div.id = 'typing-msg';
      div.innerHTML = `
      <div class="message-inner">
        <div class="avatar"><img src="/nexus logo.jpg" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" style="width:100%;height:100%;border-radius:4px;object-fit:cover;"><span style="display:none;">🤖</span></div>
        <div class="bubble">...</div>
      </div>
      `;
      chatWrapper.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing-msg');
      if (t) t.remove();
    }

    // ─── Chat Logic ───────────────────────────────────────────
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text || isLoading) return;

      isLoading = true;
      btnSend.disabled = true;
      userInput.value = '';
      userInput.style.height = 'auto';

      appendMessage('user', text);
      conversationHistory.push({ role: 'user', content: text });

      showTyping();
      statusDot.style.background = '#f59e0b'; // warning/loading

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: conversationHistory,
            systemPrompt: systemPrompt.value.trim() || null,
          }),
        });

        const data = await response.json();
        removeTyping();

        if (data.success) {
          conversationHistory.push({ role: 'assistant', content: data.message });
          appendMessage('bot', data.message);
        } else {
          appendMessage('bot', `❌ Lỗi: ${data.error}`);
          conversationHistory.pop();
        }
      } catch (err) {
        removeTyping();
        appendMessage('bot', '❌ Lỗi kết nối.');
        conversationHistory.pop();
      } finally {
        isLoading = false;
        btnSend.disabled = false;
        statusDot.style.background = '#22c55e';
        userInput.focus();
        autoSaveSession();
      }
    }

    // ─── History Logic ────────────────────────────────────────
    async function fetchSessions() {
      try {
        const res = await fetch(`/api/sessions/${userId}`);
        const data = await res.json();
        if (data.success) {
          cachedSessions = data.sessions;
          renderSessionList();
        }
      } catch (e) { }
    }

    function renderSessionList() {
      const list = document.getElementById('session-list');
      if (cachedSessions.length === 0) {
        list.innerHTML = '<div style="color:var(--text-muted); font-size:13px; padding: 10px; text-align:center;">Chưa có hội thoại nào</div>';
        return;
      }

      list.innerHTML = cachedSessions.map(s => {
        return `
          <div class="session-item" onclick="loadSession('${s.sessionId}')">
            <div class="session-title">${s.title.replace(/</g, '&lt;')}</div>
            <button class="session-del" onclick="deleteSession('${s.sessionId}', event)" title="Xoá">🗑</button>
          </div>`;
      }).join('');
    }

    function loadSession(id) {
      const session = cachedSessions.find(s => String(s.sessionId) === String(id));
      if (!session) return;

      if (conversationHistory.length > 0 && !confirm('Tải phiên này sẽ thay thế hội thoại hiện tại. Tiếp tục?')) return;

      conversationHistory = [...session.messages];
      currentSessionId = session.sessionId;
      if (session.systemPrompt) systemPrompt.value = session.systemPrompt;

      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();
      chatWrapper.innerHTML = '';
      session.messages.forEach(msg => {
        appendMessage(msg.role === 'user' ? 'user' : 'bot', msg.content);
      });

      if (window.innerWidth <= 768) toggleSidebar();
    }

    async function deleteSession(id, e) {
      e.stopPropagation();
      if (!confirm('Xoá phiên hội thoại này?')) return;
      try {
        await fetch(`/api/sessions/${userId}/${id}`, { method: 'DELETE' });
        await fetchSessions();
      } catch (e) { }
    }

    function autoSaveSession(isUnloading = false) {
      if (conversationHistory.length === 0) return;
      const firstUserMsg = conversationHistory.find(m => m.role === 'user');
      const title = firstUserMsg ? firstUserMsg.content.substring(0, 30) + (firstUserMsg.content.length > 30 ? '...' : '') : 'Hội thoại mới';

      if (!currentSessionId) {
        currentSessionId = Date.now();
      }

      const session = {
        id: currentSessionId, title, timestamp: new Date().toISOString(),
        messages: [...conversationHistory], systemPrompt: systemPrompt.value,
        msgCount: conversationHistory.length, autoSaved: true
      };

      const fetchOpts = {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, session })
      };
      if (isUnloading) fetchOpts.keepalive = true;

      fetch('/api/sessions', fetchOpts).then(() => {
        if (!isUnloading) fetchSessions();
      });
    }

    // ─── Init ─────────────────────────────────────────────────
    window.addEventListener('load', () => {
      fetchSessions();
      btnSend.disabled = true; // initially disabled
    });

    window.addEventListener('beforeunload', () => {
      autoSaveSession(true);
    });

  </script>
</body>

</html>
