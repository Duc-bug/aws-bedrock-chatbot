<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AWS Bedrock Chatbot · GPT OSS 120B</title>
  <meta name="description" content="Chatbot AI thông minh được hỗ trợ bởi AWS Bedrock và GPT OSS 120B" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    /* ─── Reset & Base ─────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #111827;
      --bg-glass: rgba(17, 24, 39, 0.7);
      --bg-card: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --border-glow: rgba(99, 102, 241, 0.4);

      --accent-1: #6366f1;
      /* indigo */
      --accent-2: #8b5cf6;
      /* violet */
      --accent-3: #06b6d4;
      /* cyan */
      --aws-orange: #ff9900;

      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #475569;

      --user-bg: linear-gradient(135deg, #6366f1, #8b5cf6);
      --bot-bg: rgba(255, 255, 255, 0.05);

      --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.15);
      --radius-lg: 16px;
      --radius-xl: 24px;
    }

    html,
    body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ─── Animated Background ───────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(99, 102, 241, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6, 182, 212, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 50% 50%, rgba(139, 92, 246, 0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ─── Layout ────────────────────────────────────────────── */
    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
      gap: 12px;
    }

    /* ─── Header ─────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--shadow-glow);
      animation: slideDown 0.5s ease;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-wrap {
      position: relative;
      width: 44px;
      height: 44px;
    }

    .logo-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
      animation: rotate 3s linear infinite;
      padding: 2px;
    }

    .logo-ring::after {
      content: '';
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--bg-primary);
    }

    .logo-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .header-info h1 {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--accent-3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-info p {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.6;
        transform: scale(1.3);
      }
    }

    .status-text {
      font-size: 12px;
      color: var(--text-secondary);
    }

    #btn-clear {
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-card);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #btn-clear:hover {
      border-color: var(--accent-1);
      color: var(--accent-1);
      background: rgba(99, 102, 241, 0.1);
    }

    /* ─── System Prompt Bar ──────────────────────────────────── */
    #system-bar {
      padding: 10px 16px;
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideDown 0.5s ease 0.1s both;
    }

    #system-bar label {
      font-size: 11px;
      font-weight: 600;
      color: var(--aws-orange);
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #system-prompt {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 13px;
    }

    #system-prompt::placeholder {
      color: var(--text-muted);
    }

    /* ─── Chat Container ─────────────────────────────────────── */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
      animation: slideDown 0.5s ease 0.2s both;
    }

    #chat-container::-webkit-scrollbar {
      width: 4px;
    }

    #chat-container::-webkit-scrollbar-track {
      background: transparent;
    }

    #chat-container::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    /* ─── Welcome Screen ─────────────────────────────────────── */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      gap: 16px;
      animation: fadeIn 0.8s ease;
    }

    .welcome-icon {
      font-size: 56px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .welcome-title {
      font-size: 26px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-3), var(--aws-orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome-sub {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 400px;
      line-height: 1.6;
    }

    .welcome-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .chip {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .chip:hover {
      border-color: var(--accent-1);
      color: var(--accent-1);
      background: rgba(99, 102, 241, 0.1);
      transform: translateY(-2px);
    }

    /* ─── Messages ───────────────────────────────────────────── */
    .message {
      display: flex;
      gap: 12px;
      animation: msgIn 0.35s ease;
    }

    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .message.user .avatar {
      background: var(--user-bg);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
    }

    .message.bot .avatar {
      background: rgba(6, 182, 212, 0.15);
      border: 1px solid rgba(6, 182, 212, 0.3);
    }

    .bubble-wrap {
      display: flex;
      flex-direction: column;
      max-width: 72%;
      gap: 4px;
    }

    .message.user .bubble-wrap {
      align-items: flex-end;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bg);
      border-bottom-right-radius: 4px;
      color: #fff;
    }

    .message.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text-primary);
    }

    .bubble pre {
      background: rgba(0, 0, 0, 0.4);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin-top: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      border: 1px solid var(--border);
    }

    .bubble code {
      font-family: 'JetBrains Mono', monospace;
      background: rgba(0, 0, 0, 0.3);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }

    .bubble pre code {
      background: none;
      padding: 0;
    }

    .msg-time {
      font-size: 10px;
      color: var(--text-muted);
      padding: 0 4px;
    }

    /* ─── Token Badge ────────────────────────────────────────── */
    .token-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(6, 182, 212, 0.1);
      border: 1px solid rgba(6, 182, 212, 0.2);
      font-size: 10px;
      color: var(--accent-3);
      margin-top: 4px;
    }

    /* ─── Typing Indicator ───────────────────────────────────── */
    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 4px 0;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent-1);
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: translateY(0);
        opacity: 0.4;
      }

      40% {
        transform: translateY(-8px);
        opacity: 1;
      }
    }

    /* ─── Input Area ─────────────────────────────────────────── */
    #input-area {
      padding: 14px 16px;
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: flex-end;
      gap: 10px;
      transition: border-color 0.2s;
      animation: slideUp 0.5s ease 0.3s both;
    }

    #input-area:focus-within {
      border-color: var(--border-glow);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      resize: none;
      max-height: 120px;
      min-height: 24px;
      line-height: 1.5;
    }

    #user-input::placeholder {
      color: var(--text-muted);
    }

    #btn-send {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    #btn-send:hover:not(:disabled) {
      transform: scale(1.08);
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.5);
    }

    #btn-send:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* ─── Footer ─────────────────────────────────────────────── */
    #footer {
      text-align: center;
      font-size: 10px;
      color: var(--text-muted);
      padding-bottom: 4px;
    }

    #footer span {
      background: linear-gradient(135deg, var(--accent-1), var(--aws-orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 600;
    }

    /* ─── Error Toast ─────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: var(--radius-lg);
      color: #fca5a5;
      font-size: 13px;
      backdrop-filter: blur(12px);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 100;
      max-width: 360px;
    }

    #toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    /* ─── Animations ─────────────────────────────────────────── */
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    /* ─── Responsive ─────────────────────────────────────────── */
    @media (max-width: 640px) {
      #app {
        padding: 8px;
        gap: 8px;
      }

      .header-info h1 {
        font-size: 14px;
      }

      .bubble-wrap {
        max-width: 85%;
      }
    }
  </style>
</head>

<body>
  <div id="app">

    <!-- Header -->
    <header id="header">
      <div class="header-left">
        <div class="logo-wrap">
          <div class="logo-ring"></div>
          <div class="logo-icon">🤖</div>
        </div>
        <div class="header-info">
          <h1>AWS Bedrock Chatbot</h1>
          <p>GPT OSS 120B · Bedrock Mantle</p>
        </div>
      </div>
      <div class="header-right">
        <div id="status-dot"></div>
        <span class="status-text" id="status-text">Online</span>
        <button id="btn-clear" onclick="clearChat()">🗑 Xoá chat</button>
      </div>
    </header>

    <!-- System Prompt Bar -->
    <div id="system-bar">
      <label>⚙ System</label>
      <input type="text" id="system-prompt" placeholder="Nhập system prompt tuỳ chỉnh (tùy chọn)..." />
    </div>

    <!-- Chat Container -->
    <div id="chat-container">
      <div id="welcome">
        <div class="welcome-icon">✨</div>
        <div class="welcome-title">Xin chào! Tôi có thể giúp gì?</div>
        <div class="welcome-chips">
          <div class="chip" onclick="sendChip('Giải thích AWS Lambda là gì?')">☁ AWS Lambda</div>
          <div class="chip" onclick="sendChip('Viết một đoạn code Python đơn giản')">🐍 Viết code Python</div>
          <div class="chip" onclick="sendChip('Phân biệt S3 và EBS trong AWS')">💾 S3 vs EBS</div>
          <div class="chip" onclick="sendChip('Kể một câu chuyện vui ngắn')">😄 Câu chuyện vui</div>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div id="input-area">
      <textarea id="user-input" placeholder="Nhập tin nhắn... (Enter để gửi, Shift+Enter xuống dòng)" rows="1"
        id="user-input"></textarea>
      <button id="btn-send" onclick="sendMessage()" title="Gửi tin nhắn">
        ➤
      </button>
    </div>

  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script>
    // ─── State ────────────────────────────────────────────────
    let conversationHistory = [];
    let isLoading = false;

    // ─── DOM Refs ─────────────────────────────────────────────
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const btnSend = document.getElementById('btn-send');
    const systemPrompt = document.getElementById('system-prompt');
    const statusText = document.getElementById('status-text');
    const statusDot = document.getElementById('status-dot');

    // ─── Auto-resize textarea ─────────────────────────────────
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    });

    // ─── Enter to send ────────────────────────────────────────
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // ─── Send chip suggestion ─────────────────────────────────
    function sendChip(text) {
      userInput.value = text;
      sendMessage();
    }

    // ─── Format time ──────────────────────────────────────────
    function formatTime() {
      return new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
    }

    // ─── Render Markdown-like ─────────────────────────────────
    function renderText(text) {
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
          `<pre><code class="lang-${lang}">${code.trim()}</code></pre>`)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/\n/g, '<br>');
    }

    // ─── Append Message ───────────────────────────────────────
    function appendMessage(role, content, meta = {}) {
      // Remove welcome screen on first message
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      const div = document.createElement('div');
      div.className = `message ${role}`;

      const avatar = role === 'user' ? '👤' : '🤖';
      const bubbleContent = role === 'bot' ? renderText(content) : content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');

      div.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div class="bubble-wrap">
        <div class="bubble">${bubbleContent}</div>
        <div class="msg-time">${formatTime()}${meta.tokens ? ` &nbsp;·&nbsp; <span class="token-badge">🔢 ${meta.tokens} tokens</span>` : ''}</div>
      </div>
    `;

      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return div;
    }

    // ─── Show Typing ──────────────────────────────────────────
    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message bot';
      div.id = 'typing-msg';
      div.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble-wrap">
        <div class="bubble">
          <div class="typing-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    `;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing-msg');
      if (t) t.remove();
    }

    // ─── Set Status ───────────────────────────────────────────
    function setStatus(status) {
      if (status === 'loading') {
        statusDot.style.background = '#f59e0b';
        statusDot.style.boxShadow = '0 0 8px #f59e0b';
        statusText.textContent = 'Đang xử lý...';
      } else {
        statusDot.style.background = '#22c55e';
        statusDot.style.boxShadow = '0 0 8px #22c55e';
        statusText.textContent = 'Online';
      }
    }

    // ─── Toast ────────────────────────────────────────────────
    function showToast(msg, duration = 4000) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), duration);
    }

    // ─── Clear Chat ───────────────────────────────────────────
    function clearChat() {
      conversationHistory = [];
      chatContainer.innerHTML = `
      <div id="welcome">
        <div class="welcome-icon">✨</div>
        <div class="welcome-title">Xin chào! Tôi có thể giúp gì?</div>
        <p class="welcome-sub">
          Được vận hành bởi <strong>AWS Bedrock</strong> &amp
          Hãy đặt câu hỏi bất kỳ!
        </p>
        <div class="welcome-chips">
          <div class="chip" onclick="sendChip('Giải thích AWS Lambda là gì?')">☁ AWS Lambda</div>
          <div class="chip" onclick="sendChip('Viết một đoạn code Python đơn giản')">🐍 Viết code Python</div>
          <div class="chip" onclick="sendChip('Phân biệt S3 và EBS trong AWS')">Tìm hiểu thông tin</div>
          <div class="chip" onclick="sendChip('Kể một câu chuyện vui ngắn')">😄 Câu chuyện vui</div>
        </div>
      </div>
    `;
    }

    // ─── Send Message ─────────────────────────────────────────
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text || isLoading) return;

      isLoading = true;
      btnSend.disabled = true;
      userInput.value = '';
      userInput.style.height = 'auto';

      // Append user message
      appendMessage('user', text);
      conversationHistory.push({ role: 'user', content: text });

      // Show typing
      showTyping();
      setStatus('loading');

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: conversationHistory,
            systemPrompt: systemPrompt.value.trim() || null,
          }),
        });

        const data = await response.json();
        removeTyping();

        if (data.success) {
          conversationHistory.push({ role: 'assistant', content: data.message });
          appendMessage('bot', data.message, {
            tokens: data.usage?.totalTokens,
          });
        } else {
          const errMsg = `❌ ${data.error}\n${data.suggestion ? '💡 ' + data.suggestion : ''}`;
          appendMessage('bot', errMsg);
          showToast(`${data.error}${data.suggestion ? ' · ' + data.suggestion : ''}`);
          // Remove failed message from history
          conversationHistory.pop();
        }
      } catch (err) {
        removeTyping();
        appendMessage('bot', '❌ Không thể kết nối server. Hãy kiểm tra server đang chạy.');
        showToast('Lỗi kết nối: ' + err.message);
        conversationHistory.pop();
      } finally {
        isLoading = false;
        btnSend.disabled = false;
        setStatus('online');
        userInput.focus();
      }
    }

    // ─── Health check on load ─────────────────────────────────
    window.addEventListener('load', async () => {
      try {
        const res = await fetch('/api/health');
        const data = await res.json();
        console.log('✅ Server health:', data);
      } catch {
        setStatus('offline');
        statusText.textContent = 'Server offline';
        statusDot.style.background = '#ef4444';
        statusDot.style.boxShadow = '0 0 8px #ef4444';
      }
    });
  </script>
</body>
