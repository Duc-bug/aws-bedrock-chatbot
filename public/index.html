<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus AI</title>
  <meta name="description" content="Chatbot AI thông minh " />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    /* ─── Reset & Base ─────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #111827;
      --bg-glass: rgba(17, 24, 39, 0.7);
      --bg-card: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --border-glow: rgba(99, 102, 241, 0.4);

      --accent-1: #6366f1;
      /* indigo */
      --accent-2: #8b5cf6;
      /* violet */
      --accent-3: #06b6d4;
      /* cyan */
      --aws-orange: #ff9900;

      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #475569;

      --user-bg: linear-gradient(135deg, #6366f1, #8b5cf6);
      --bot-bg: rgba(255, 255, 255, 0.05);

      --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.15);
      --radius-lg: 16px;
      --radius-xl: 24px;
    }

    html,
    body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ─── Animated Background ───────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(99, 102, 241, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6, 182, 212, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 50% 50%, rgba(139, 92, 246, 0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ─── Layout ────────────────────────────────────────────── */
    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
      gap: 12px;
    }

    /* ─── Header ─────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--shadow-glow);
      animation: slideDown 0.5s ease;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-wrap {
      position: relative;
      width: 44px;
      height: 44px;
    }

    .logo-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
      animation: rotate 3s linear infinite;
      padding: 2px;
    }

    .logo-ring::after {
      content: '';
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--bg-primary);
    }

    .logo-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .header-info h1 {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--accent-3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-info p {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.6;
        transform: scale(1.3);
      }
    }

    .status-text {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .header-btn {
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-card);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .header-btn:hover {
      border-color: var(--accent-1);
      color: var(--accent-1);
      background: rgba(99, 102, 241, 0.1);
    }

    /* ─── History Sidebar ─────────────────────────────────── */
    #history-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #history-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    #history-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 340px;
      height: 100vh;
      background: #0d1220;
      border-left: 1px solid var(--border);
      z-index: 201;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      box-shadow: -8px 0 40px rgba(0,0,0,0.4);
    }
    #history-panel.open {
      transform: translateX(0);
    }

    .history-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .history-header h2 {
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #btn-close-history {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    #btn-close-history:hover { border-color: #ef4444; color: #ef4444; }

    #btn-save-session {
      margin: 12px 16px;
      padding: 10px;
      border-radius: 10px;
      border: 1px dashed var(--accent-1);
      background: rgba(99,102,241,0.08);
      color: var(--accent-1);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    #btn-save-session:hover {
      background: rgba(99,102,241,0.18);
      box-shadow: 0 0 12px rgba(99,102,241,0.3);
    }

    #session-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #session-list::-webkit-scrollbar { width: 3px; }
    #session-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .session-item {
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .session-item:hover {
      border-color: var(--accent-1);
      background: rgba(99,102,241,0.07);
      transform: translateX(-2px);
    }
    .session-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
    .session-info { flex: 1; min-width: 0; }
    .session-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
    }
    .session-del {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .session-del:hover { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,0.1); }

    .no-sessions {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.8;
    }
    .no-sessions .no-icon { font-size: 40px; margin-bottom: 12px; }

    @media (max-width: 400px) {
      #history-panel { width: 100vw; }
    }

    /* ─── System Prompt Bar ──────────────────────────────────── */
    #system-bar {
      padding: 10px 16px;
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideDown 0.5s ease 0.1s both;
    }

    #system-bar label {
      font-size: 11px;
      font-weight: 600;
      color: var(--aws-orange);
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #system-prompt {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 13px;
    }

    #system-prompt::placeholder {
      color: var(--text-muted);
    }

    /* ─── Chat Container ─────────────────────────────────────── */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
      animation: slideDown 0.5s ease 0.2s both;
    }

    #chat-container::-webkit-scrollbar {
      width: 4px;
    }

    #chat-container::-webkit-scrollbar-track {
      background: transparent;
    }

    #chat-container::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    /* ─── Welcome Screen ─────────────────────────────────────── */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      gap: 16px;
      animation: fadeIn 0.8s ease;
    }

    .welcome-icon {
      font-size: 56px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .welcome-title {
      font-size: 26px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-3), var(--aws-orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome-sub {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 400px;
      line-height: 1.6;
    }

    .welcome-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .chip {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .chip:hover {
      border-color: var(--accent-1);
      color: var(--accent-1);
      background: rgba(99, 102, 241, 0.1);
      transform: translateY(-2px);
    }

    /* ─── Messages ───────────────────────────────────────────── */
    .message {
      display: flex;
      gap: 12px;
      animation: msgIn 0.35s ease;
    }

    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .message.user .avatar {
      background: var(--user-bg);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
    }

    .message.bot .avatar {
      background: rgba(6, 182, 212, 0.15);
      border: 1px solid rgba(6, 182, 212, 0.3);
    }

    .bubble-wrap {
      display: flex;
      flex-direction: column;
      max-width: 72%;
      gap: 4px;
    }

    .message.user .bubble-wrap {
      align-items: flex-end;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bg);
      border-bottom-right-radius: 4px;
      color: #fff;
    }

    .message.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text-primary);
    }

    .bubble pre {
      background: rgba(0, 0, 0, 0.4);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin-top: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      border: 1px solid var(--border);
    }

    .bubble code {
      font-family: 'JetBrains Mono', monospace;
      background: rgba(0, 0, 0, 0.3);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }

    .bubble pre code {
      background: none;
      padding: 0;
    }

    .msg-time {
      font-size: 10px;
      color: var(--text-muted);
      padding: 0 4px;
    }

    /* ─── Token Badge ────────────────────────────────────────── */
    .token-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(6, 182, 212, 0.1);
      border: 1px solid rgba(6, 182, 212, 0.2);
      font-size: 10px;
      color: var(--accent-3);
      margin-top: 4px;
    }

    /* ─── Typing Indicator ───────────────────────────────────── */
    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 4px 0;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent-1);
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: translateY(0);
        opacity: 0.4;
      }

      40% {
        transform: translateY(-8px);
        opacity: 1;
      }
    }

    /* ─── Input Area ─────────────────────────────────────────── */
    #input-area {
      padding: 14px 16px;
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: flex-end;
      gap: 10px;
      transition: border-color 0.2s;
      animation: slideUp 0.5s ease 0.3s both;
    }

    #input-area:focus-within {
      border-color: var(--border-glow);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      resize: none;
      max-height: 120px;
      min-height: 24px;
      line-height: 1.5;
    }

    #user-input::placeholder {
      color: var(--text-muted);
    }

    #btn-send {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    #btn-send:hover:not(:disabled) {
      transform: scale(1.08);
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.5);
    }

    #btn-send:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* ─── Footer ─────────────────────────────────────────────── */
    #footer {
      text-align: center;
      font-size: 10px;
      color: var(--text-muted);
      padding-bottom: 4px;
    }

    #footer span {
      background: linear-gradient(135deg, var(--accent-1), var(--aws-orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 600;
    }

    /* ─── Error Toast ─────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: var(--radius-lg);
      color: #fca5a5;
      font-size: 13px;
      backdrop-filter: blur(12px);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 100;
      max-width: 360px;
    }

    #toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    /* ─── Animations ─────────────────────────────────────────── */
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    /* ─── Responsive ─────────────────────────────────────────── */
    @media (max-width: 640px) {
      #app {
        padding: 8px;
        gap: 8px;
      }

      .header-info h1 {
        font-size: 14px;
      }

      .bubble-wrap {
        max-width: 85%;
      }
    }
  </style>
</head>

<body>
  <div id="app">

    <!-- Header -->
    <header id="header">
      <div class="header-left">
        <div class="logo-wrap">
          <div class="logo-ring"></div>
          <div class="logo-icon">🤖</div>
        </div>
        <div class="header-info">
          <h1>Nexus AI</h1>
          <p> Bedrock Mantle</p>
        </div>
      </div>
      <div class="header-right">
        <div id="status-dot"></div>
        <span class="status-text" id="status-text">Online</span>
        <button class="header-btn" id="btn-history" onclick="toggleHistory()">📋 Lịch sử</button>
        <button class="header-btn" id="btn-clear" onclick="clearChat()">🗑 Xoá chat</button>
      </div>
    </header>

    <!-- System Prompt Bar -->
    <div id="system-bar">
      <label>⚙ System</label>
      <input type="text" id="system-prompt" placeholder="Nhập system prompt tuỳ chỉnh (tùy chọn)..." />
    </div>

    <!-- Chat Container -->
    <div id="chat-container">
      <div id="welcome">
        <div class="welcome-icon">✨</div>
        <div class="welcome-title">Xin chào! Tôi có thể giúp gì?</div>
        <div class="welcome-chips">
          <div class="chip" onclick="sendChip('Giải thích AWS Lambda là gì?')">☁ AWS Lambda</div>
          <div class="chip" onclick="sendChip('Viết một đoạn code Python đơn giản')">🐍 Viết code Python</div>
          <div class="chip" onclick="sendChip('Phân biệt S3 và EBS trong AWS')">💾 S3 vs EBS</div>
          <div class="chip" onclick="sendChip('Kể một câu chuyện vui ngắn')">😄 Câu chuyện hài</div>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div id="input-area">
      <textarea id="user-input" placeholder="Nhập tin nhắn... (Enter để gửi, Shift+Enter xuống dòng)" rows="1"
        id="user-input"></textarea>
      <button id="btn-send" onclick="sendMessage()" title="Gửi tin nhắn">
        ➤
      </button>
    </div>

  </div>

  <!-- History Sidebar -->
  <div id="history-overlay" onclick="toggleHistory()"></div>
  <div id="history-panel">
    <div class="history-header">
      <h2>📋 Lịch sử hội thoại</h2>
      <button id="btn-close-history" onclick="toggleHistory()">✕</button>
    </div>
    <button id="btn-save-session" onclick="saveCurrentSession()">💾 Lưu cuộc hội thoại hiện tại</button>
    <div id="session-list"></div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script>
    // ─── State ────────────────────────────────────────────────
    let conversationHistory = [];
    let isLoading = false;

    // ─── LocalStorage Keys ────────────────────────────────────
    const LS_HISTORY  = 'nexus_chat_history';
    const LS_SYSTEM   = 'nexus_system_prompt';
    const LS_SESSIONS = 'nexus_sessions';

    // ─── Lưu dữ liệu vào localStorage ────────────────────────
    function saveToStorage() {
      try {
        localStorage.setItem(LS_HISTORY, JSON.stringify(conversationHistory));
        localStorage.setItem(LS_SYSTEM, systemPrompt.value);
      } catch (e) {
        console.warn('localStorage không khả dụng:', e);
      }
    }

    // ─── Khôi phục dữ liệu từ localStorage ───────────────────
    function loadFromStorage() {
      try {
        // Chỉ khôi phục system prompt, không render lại tin nhắn
        const savedSystem = localStorage.getItem(LS_SYSTEM);
        if (savedSystem) {
          systemPrompt.value = savedSystem;
        }
      } catch (e) {
        console.warn('Không thể đọc localStorage:', e);
      }
    }

    // ─── DOM Refs ─────────────────────────────────────────────
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const btnSend = document.getElementById('btn-send');
    const systemPrompt = document.getElementById('system-prompt');
    const statusText = document.getElementById('status-text');
    const statusDot = document.getElementById('status-dot');

    // ─── Auto-resize textarea ─────────────────────────────────
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    });

    // ─── Enter to send ────────────────────────────────────────
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // ─── Send chip suggestion ─────────────────────────────────
    function sendChip(text) {
      userInput.value = text;
      sendMessage();
    }

    // ─── Format time ──────────────────────────────────────────
    function formatTime() {
      return new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
    }

    // ─── Render Markdown-like ─────────────────────────────────
    function renderText(text) {
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
          `<pre><code class="lang-${lang}">${code.trim()}</code></pre>`)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/\n/g, '<br>');
    }

    // ─── Append Message ───────────────────────────────────────
    function appendMessage(role, content, meta = {}) {
      // Remove welcome screen on first message
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      const div = document.createElement('div');
      div.className = `message ${role}`;

      const avatar = role === 'user' ? '👤' : '🤖';
      const bubbleContent = role === 'bot' ? renderText(content) : content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');

      div.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div class="bubble-wrap">
        <div class="bubble">${bubbleContent}</div>
        <div class="msg-time">${formatTime()}${meta.tokens ? ` &nbsp;·&nbsp; <span class="token-badge">🔢 ${meta.tokens} tokens</span>` : ''}</div>
      </div>
    `;

      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return div;
    }

    // ─── Show Typing ──────────────────────────────────────────
    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message bot';
      div.id = 'typing-msg';
      div.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble-wrap">
        <div class="bubble">
          <div class="typing-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    `;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing-msg');
      if (t) t.remove();
    }

    // ─── Set Status ───────────────────────────────────────────
    function setStatus(status) {
      if (status === 'loading') {
        statusDot.style.background = '#f59e0b';
        statusDot.style.boxShadow = '0 0 8px #f59e0b';
        statusText.textContent = 'Đang xử lý...';
      } else {
        statusDot.style.background = '#22c55e';
        statusDot.style.boxShadow = '0 0 8px #22c55e';
        statusText.textContent = 'Online';
      }
    }

    // ─── Toast ────────────────────────────────────────────────
    function showToast(msg, duration = 4000) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), duration);
    }

    // ─── Clear Chat ───────────────────────────────────────────
    function clearChat() {
      if (!confirm('Bạn có chắc muốn xoá toàn bộ lịch sử chat không?')) return;
      conversationHistory = [];
      // Xoá khỏi localStorage
      localStorage.removeItem(LS_HISTORY);
      chatContainer.innerHTML = `
      <div id="welcome">
        <div class="welcome-icon">✨</div>
        <div class="welcome-title">Xin chào! Tôi có thể giúp gì?</div>
        <p class="welcome-sub">
          Được vận hành bởi <strong>AWS Bedrock</strong> &amp;
          Hãy đặt câu hỏi bất kỳ!
        </p>
        <div class="welcome-chips">
          <div class="chip" onclick="sendChip('Giải thích AWS Lambda là gì?')">☁ AWS Lambda</div>
          <div class="chip" onclick="sendChip('Viết một đoạn code Python đơn giản')">🐍 Viết code Python</div>
          <div class="chip" onclick="sendChip('Phân biệt S3 và EBS trong AWS')">Tìm hiểu thông tin</div>
          <div class="chip" onclick="sendChip('Kể một câu chuyện vui ngắn')">😄 Câu chuyện vui</div>
        </div>
      </div>
    `;
    }

    // ─── Send Message ─────────────────────────────────────────
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text || isLoading) return;

      isLoading = true;
      btnSend.disabled = true;
      userInput.value = '';
      userInput.style.height = 'auto';

      // Append user message
      appendMessage('user', text);
      conversationHistory.push({ role: 'user', content: text });
      saveToStorage();

      // Show typing
      showTyping();
      setStatus('loading');

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: conversationHistory,
            systemPrompt: systemPrompt.value.trim() || null,
          }),
        });

        const data = await response.json();
        removeTyping();

        if (data.success) {
          conversationHistory.push({ role: 'assistant', content: data.message });
          saveToStorage();
          appendMessage('bot', data.message, {
            tokens: data.usage?.totalTokens,
          });
        } else {
          const errMsg = `❌ ${data.error}\n${data.suggestion ? '💡 ' + data.suggestion : ''}`;
          appendMessage('bot', errMsg);
          showToast(`${data.error}${data.suggestion ? ' · ' + data.suggestion : ''}`);
          // Remove failed message from history
          conversationHistory.pop();
        }
      } catch (err) {
        removeTyping();
        appendMessage('bot', '❌ Không thể kết nối server. Hãy kiểm tra server đang chạy.');
        showToast('Lỗi kết nối: ' + err.message);
        conversationHistory.pop();
      } finally {
        isLoading = false;
        btnSend.disabled = false;
        setStatus('online');
        userInput.focus();
      }
    }

    // ─── History Sidebar ──────────────────────────────────────
    function toggleHistory() {
      const panel   = document.getElementById('history-panel');
      const overlay = document.getElementById('history-overlay');
      const isOpen  = panel.classList.toggle('open');
      overlay.classList.toggle('open', isOpen);
      if (isOpen) renderSessionList();
    }

    function getSessions() {
      try {
        return JSON.parse(localStorage.getItem(LS_SESSIONS) || '[]');
      } catch { return []; }
    }

    function saveSessions(sessions) {
      localStorage.setItem(LS_SESSIONS, JSON.stringify(sessions));
    }

    function saveCurrentSession() {
      if (conversationHistory.length === 0) {
        showToast('⚠️ Chưa có tin nhắn nào để lưu!', 2500);
        return;
      }
      const firstUserMsg = conversationHistory.find(m => m.role === 'user');
      const title = firstUserMsg
        ? firstUserMsg.content.substring(0, 50) + (firstUserMsg.content.length > 50 ? '...' : '')
        : 'Hội thoại ' + new Date().toLocaleString('vi-VN');

      const session = {
        id: Date.now(),
        title,
        timestamp: new Date().toISOString(),
        messages: [...conversationHistory],
        systemPrompt: systemPrompt.value,
        msgCount: conversationHistory.length,
      };

      const sessions = getSessions();
      sessions.unshift(session);
      // Giới hạn 30 phiên
      if (sessions.length > 30) sessions.splice(30);
      saveSessions(sessions);
      renderSessionList();
      showToast('✅ Đã lưu phiên hội thoại!', 2500);
    }

    function loadSession(id) {
      const sessions = getSessions();
      const session  = sessions.find(s => s.id === id);
      if (!session) return;

      if (conversationHistory.length > 0 && !confirm('Tải phiên này sẽ thay thế hội thoại hiện tại. Tiếp tục?')) return;

      conversationHistory = [...session.messages];
      if (session.systemPrompt) systemPrompt.value = session.systemPrompt;
      saveToStorage();

      // Render lại
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();
      chatContainer.innerHTML = '';
      session.messages.forEach(msg => {
        appendMessage(msg.role === 'user' ? 'user' : 'bot', msg.content);
      });

      toggleHistory();
      showToast('📂 Đã tải phiên: ' + session.title.substring(0, 30), 3000);
    }

    function deleteSession(id, e) {
      e.stopPropagation();
      if (!confirm('Xoá phiên hội thoại này?')) return;
      const sessions = getSessions().filter(s => s.id !== id);
      saveSessions(sessions);
      renderSessionList();
    }

    function renderSessionList() {
      const list     = document.getElementById('session-list');
      const sessions = getSessions();

      if (sessions.length === 0) {
        list.innerHTML = `
          <div class="no-sessions">
            <div class="no-icon">💬</div>
            <div>Chưa có phiên nào được lưu.</div>
            <div style="margin-top:6px;font-size:12px;">Nhấn <strong style="color:var(--accent-1);">Lưu cuộc hội thoại</strong> để lưu lại.</div>
          </div>`;
        return;
      }

      list.innerHTML = sessions.map(s => {
        const date = new Date(s.timestamp).toLocaleString('vi-VN', {
          day:'2-digit', month:'2-digit', year:'numeric',
          hour:'2-digit', minute:'2-digit'
        });
        const msgLabel = Math.floor(s.msgCount / 2) + ' câu hỏi';
        return `
          <div class="session-item" onclick="loadSession(${s.id})">
            <div class="session-icon">💬</div>
            <div class="session-info">
              <div class="session-title">${s.title.replace(/</g,'&lt;')}</div>
              <div class="session-meta">${date} &nbsp;·&nbsp; ${msgLabel}</div>
            </div>
            <button class="session-del" onclick="deleteSession(${s.id}, event)" title="Xoá phiên này">🗑</button>
          </div>`;
      }).join('');
    }

    // ─── Tự động lưu phiên khi thoát / reload ────────────────
    window.addEventListener('beforeunload', () => {
      if (conversationHistory.length === 0) return;

      const firstUserMsg = conversationHistory.find(m => m.role === 'user');
      const title = firstUserMsg
        ? firstUserMsg.content.substring(0, 50) + (firstUserMsg.content.length > 50 ? '...' : '')
        : 'Hội thoại ' + new Date().toLocaleString('vi-VN');

      const session = {
        id: Date.now(),
        title,
        timestamp: new Date().toISOString(),
        messages: [...conversationHistory],
        systemPrompt: systemPrompt.value,
        msgCount: conversationHistory.length,
        autoSaved: true,  // đánh dấu là tự động lưu
      };

      const sessions = getSessions();
      // Xoá phiên auto-save cũ nhất nếu đã có (tránh trùng)
      const withoutOldAuto = sessions.filter(s => !s.autoSaved);
      withoutOldAuto.unshift(session);
      if (withoutOldAuto.length > 30) withoutOldAuto.splice(30);
      saveSessions(withoutOldAuto);

      // Xoá LS_HISTORY → lần mở tiếp theo bắt đầu trang mới
      localStorage.removeItem(LS_HISTORY);
    });

    // ─── Health check on load + Khôi phục dữ liệu ───────────
    window.addEventListener('load', async () => {
      // Chỉ khôi phục system prompt, bắt đầu trang mới
      loadFromStorage();

      // Lưu system prompt khi người dùng thay đổi
      systemPrompt.addEventListener('input', saveToStorage);

      // Health check
      try {
        const res = await fetch('/api/health');
        const data = await res.json();
        console.log('✅ Server health:', data);
      } catch {
        setStatus('offline');
        statusText.textContent = 'Server offline';
        statusDot.style.background = '#ef4444';
        statusDot.style.boxShadow = '0 0 8px #ef4444';
      }
    });
  </script>
</body>

</html>
